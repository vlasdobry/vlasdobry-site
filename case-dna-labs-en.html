            <header>
                <h1>Google Ads for DNA labs: 4.5 months, 5 countries, $1.30 CPA</h1>
                <p><strong>$1.30 CPA against $66 US healthcare CPL (LocaliQ 2025).</strong> Real Google Ads case study: 5 countries (Kazakhstan, Kyrgyzstan, Belarus, Azerbaijan, Georgia), 7,340 conversions over 4.5 months, blended CPA $1.30.</p>
                <p>Zero brand campaigns - only category queries.</p>
            </header>

            <section>
                <h2>Numbers - June to October 2025</h2>
                <ul>
                    <li>Spend: $9,569</li>
                    <li>Conversions: 7,340</li>
                    <li>Blended CPA: $1.30</li>
                    <li>Clicks: 272,076</li>
                    <li>Blended CPC: $0.04</li>
                    <li>Blended CTR: 5.05%</li>
                </ul>
                <p>Conversions counted: submitted lead forms, phone-number clicks, messenger button clicks.</p>
            </section>

            <section>
                <h2>By campaign type</h2>
                <ul>
                    <li><strong>Search:</strong> CPC $0.17, CTR 21.07%, CPA $3.03</li>
                    <li><strong>Performance Max:</strong> CPC $0.02, CTR 4.67%, CPA $0.86</li>
                </ul>
            </section>

            <section>
                <h2>Global benchmarks</h2>
                <ul>
                    <li>Blended CPA $1.30 vs $66 US healthcare CPL (LocaliQ, 2025)</li>
                    <li>Search CTR 21.07% vs 6.07% US healthcare - 3.5x above</li>
                    <li>PMax CTR 4.67% vs 1.19% global PMax (Lebesgue) - 3.9x above</li>
                    <li>PMax CPA $0.86 vs Search CPA $3.03 (same account) - PMax 3.5x cheaper</li>
                </ul>
            </section>

            <section>
                <h2>#1 auction share in 4 of 5 countries</h2>
                <p>Impression share against 95 competing domains (including ancestry.com and myheritage.com): Kazakhstan 45%, Kyrgyzstan 45%, Belarus 41%, Azerbaijan 38%. Georgia (ru) - peaked at 62% in July 2025.</p>
            </section>

            <section>
                <h2>What I did</h2>
                <p>The main lever was daily Quality Score work. Over the period: 258 account reviews, 125 search-term cleanup sessions, 67 ad edits, 27 appeals to Google moderation, 50+ bid adjustments, 93 new ad groups and 22 new campaigns. Language segmentation across Russian, English, Azerbaijani, and Kazakh.</p>
